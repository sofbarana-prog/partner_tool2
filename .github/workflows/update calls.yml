name: Update EU Calls

on:
  schedule:
    - cron: "0 2 * * *"   # ogni notte alle 02:00 UTC (04:00 ora italiana)
  workflow_dispatch:       # run manuale dal tab Actions

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape EU calls → calls.json
        run: python scrape_to_json.py --out calls.json
        timeout-minutes: 90

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calls.json changelog.md changelog_history.md
          git diff --staged --quiet || git commit -m "chore: update calls [$(date -u +%Y-%m-%d)]"
          git push
