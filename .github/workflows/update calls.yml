name: Update EU Calls

on:
  schedule:
    - cron: "0 2 * * *"   # every night at 02:00 UTC
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium --with-deps

      - name: Scrape EU direct-managed calls → calls.json
        run: python scrape_to_json.py --out calls.json
        timeout-minutes: 90

      - name: Scrape shared-management programmes → shared_programmes.json
        run: python scrape_shared_programmes.py
        timeout-minutes: 10

      - name: Scrape innovation events → events.json
        run: python scrape_events.py
        timeout-minutes: 15

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calls.json changelog.md changelog_history.md shared_programmes.json events.json
          git diff --staged --quiet || git commit -m "chore: update calls + events [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push
